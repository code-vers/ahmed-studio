<!doctype html>

<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Ahmed Studio</title>

		<!-- Poppins Font -->
		<!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet"/>
		<script src="https://kit.fontawesome.com/01df2ad523.js" crossorigin="anonymous"></script>
		<link rel="stylesheet" href="../style.css" />
	</head>

	<body>
		<div class="container">
			<!-- Left Side -->
			<div class="left">
				<div class="tagline">
					<p>Collecting Memories</p>
					<p>Creating Moments</p>

					<div class="lines">
						<span class="active-line"></span>
						<span></span>
						<span></span>
					</div>
				</div>
			</div>

			<!-- Right Side -->
			<div class="right">
				<div class="login-card">
					<h2>Sign in</h2>
					<p class="subtitle">Enter to get unlimited data & information</p>

					<form class="text-primary text-bold">
						<label>Email *</label>
						<input type="email" class="input-border" placeholder="Enter your mail address..." />

						<label>Password *</label>
						<div class="password-box">
							<input type="password" class="input-border" placeholder="Enter Password" />
							<span class="eye"><i class="fa-regular fa-eye"></i></span>
						</div>

						<a href="#" class="forgot">Forgot Password?</a>

						<button type="submit">Sign In</button>
					</form>
				</div>
			</div>
		</div>
		<script src="https://kit.fontawesome.com/01df2ad523.js" crossorigin="anonymous"></script>
		<script src="../script.js"></script>
	</body>
</html>
